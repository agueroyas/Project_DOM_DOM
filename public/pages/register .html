<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StartIt - Sign up</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter;
background:#f3f6fb;
color:#0f172a;
}

.wrapper{
display:grid;
grid-template-columns: 1fr 1fr;
min-height:100vh;
}

.left{
background:linear-gradient(160deg,#0f172a,#1e293b);
color:white;
padding:60px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.logo{
font-size:28px;
font-weight:700;
letter-spacing:.5px;
}

.big-text{
font-size:40px;
font-weight:700;
line-height:1.2;
max-width:420px;
margin-top:80px;
}

.quote{
opacity:.7;
font-size:14px;
max-width:380px;
}

.shape{
width:260px;height:260px;
background:linear-gradient(45deg,#22c55e,#3b82f6);
border-radius:60px;
transform:rotate(20deg);
margin-top:40px;
filter:blur(1px);
}

.right{
background:#ffffff;
padding:60px 80px;
display:flex;
flex-direction:column;
justify-content:center;
}

h1{
margin:0;
font-size:32px;
margin-bottom: 3rem;
}

.roles{
display:flex;
gap:10px;
margin-bottom:35px;
}

.role{
padding:12px 18px;
border:1px solid #e2e8f0;
border-radius:10px;
cursor:pointer;
font-size:14px;
transition:.2s;
}

.role.active{
background:#0f172a;
color:white;
border-color:#0f172a;
}

label{
font-size:12px;
color:#64748b;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #e2e8f0;
margin-bottom:20px;
font-size:14px;
outline:none;
transition:border-color .2s;
}

input:focus{
border-color:#0f172a;
}

button[type="submit"]{
width:100%;
padding:14px;
background:#0f172a;
color:white;
border:none;
border-radius:12px;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button[type="submit"]:hover{
background:#1e293b;
}

button[type="submit"]:disabled{
opacity:0.6;
cursor:not-allowed;
}

.logos{
display:flex;
gap:25px;
margin-top:30px;
opacity:.5;
font-size:12px;
}

.alert{
padding:12px 16px;
border-radius:10px;
margin-bottom:16px;
font-size:14px;
display:none;
}

.alert.success{
background:#dcfce7;
color:#166534;
border:1px solid #bbf7d0;
display:block;
}

.alert.error{
background:#fef2f2;
color:#991b1b;
border:1px solid #fecaca;
display:block;
}

.login-link{
text-align:center;
margin-top:20px;
font-size:14px;
color:#64748b;
}

.login-link a{
color:#0f172a;
font-weight:600;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

@media(max-width:900px){
.wrapper{grid-template-columns:1fr}
.left{display:none}
.right{padding:40px}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left">
<div>
<div class="logo">StartIt</div>
<div class="big-text">
Where startups meet
their first believers.
</div>
<div class="shape"></div>
</div>
<div class="quote">
Trusted by founders from YC, Antler and Techstars.
</div>
</div>

<div class="right">
<h1>Create account</h1>

<div id="alert" class="alert"></div>

<div class="roles">
<div class="role active" onclick="selectRole(this)">Investor</div>
<div class="role" onclick="selectRole(this)">Startup</div>
</div>

<form id="registerForm" onsubmit="handleRegister(event)">
<input type="hidden" id="roleInput" value="investor">

<label>Full name</label>
<input type="text" id="fullname" placeholder="Jane Smith" required>

<label>Email</label>
<input type="email" id="email" placeholder="jane@company.com" required>

<label>Password</label>
<input type="password" id="password" placeholder="••••••••" required>

<button type="submit" id="submitBtn">Create account as Investor</button>
</form>

<div class="logos">
<span>YC</span>
<span>Techstars</span>
<span>Antler</span>
<span>Seedcamp</span>
</div>

<div class="login-link">
Already have an account? <a href="login.html">Log in</a>
</div>
</div>
</div>

<script>
const API_BASE = 'https://dev-storage-c.pantheonsite.io/collab/domdom/api';
let currentRole = 'investor';

function selectRole(el) {
    document.querySelectorAll('.role').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    currentRole = el.innerHTML.toLowerCase();
    document.getElementById('roleInput').value = currentRole;
    document.getElementById('submitBtn').textContent =
        'Create account as ' + el.innerHTML;
}

function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = 'alert ' + type;
}

function hideAlert() {
    const alert = document.getElementById('alert');
    alert.className = 'alert';
}

async function handleRegister(e) {
    e.preventDefault();
    hideAlert();

    const fullname = document.getElementById('fullname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.getElementById('roleInput').value;
    const btn      = document.getElementById('submitBtn');

    if (!fullname || !email || !password) {
        showAlert('Please fill in all fields.', 'error');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
        const response = await fetch(API_BASE + '/register.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullname, email, password, role })
        });

        const data = await response.json();

        if (data.success) {
            showAlert('Account created successfully! Redirecting to login...', 'success');
            localStorage.setItem('registered_email', email);
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            showAlert(data.message || 'Registration failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Create account as ' + (role === 'investor' ? 'Investor' : 'Startup');
        }
    } catch (err) {
        showAlert('Connection error. Please check your internet and try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create account as ' + (role === 'investor' ? 'Investor' : 'Startup');
    }
}
</script>

</body>
</html>
