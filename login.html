*{

}

html{

.form{
    width:100%;

    padding:4.5rem 4rem;
    background:#fff;
    border-radius:1.8rem;
    box-shadow:0 2rem 6rem rgba(0,0,0,0.08);

.form p:first-child{

    font-size:1.5rem;
    margin-bottom:.5rem;
}

.form h2{

    font-weight:600;
    margin-bottom:3rem;
}

    margin-bottom:.6rem;
    color:#333;
}


.margin{
    width:100%;
    border:none;
    border-bottom:.2rem solid #ddd;
    padding:1rem 0;
    margin-bottom:2.8rem;
    font-size:1.6rem;
    transition:.3s;
}

.margin:focus{
    outline:none;
    border-color:#07073d;
}


.submit{
    width:100%;
    padding:1.4rem;
    border:none;
    border-radius:3rem;
    background:#07073d;
    color:#fff;
    font-size:1.7rem;
    font-weight:500;
    margin-top:1rem;

.submit:hover{

.form form + p{

.social{

.btn{

    padding:1rem 1.8rem;
    border-radius:3rem;
    border:none;
    font-size:1.4rem;

b:hover{

}
svg{
    margin:0 2rem 0 1.5rem;

.btn2{

.last{

@media (max-width:600px){
    html{

}

@media (max-width:400px){
